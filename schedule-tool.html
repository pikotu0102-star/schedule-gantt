<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Gantt Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f5f7;--surface:#fff;--border:#e2e5ea;--border2:#d0d5dd;
  --text-1:#0f1523;--text-2:#4a5568;--text-3:#8c97a8;
  --accent:#0057ff;--accent-lt:#e8effe;
  --green:#00875a;--green-lt:#e3f5ef;
  --red:#c0392b;--red-lt:#fdf0ef;
  --amber:#b45309;--amber-lt:#fef3c7;
  --purple:#6d28d9;--purple-lt:#ede9fe;
  --sans:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text-1);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;flex-shrink:0}
.topbar-title{font-weight:700;font-size:.95rem}
.topbar-sub{font-size:.75rem;color:var(--text-3)}
.main{max-width:1300px;margin:0 auto;padding:28px 32px}
.upload-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px}
.panel-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:14px}
.upload-slots{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.slot{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.slot:hover{border-color:var(--accent);background:var(--accent-lt)}
.slot.loaded{border-color:var(--green);border-style:solid;background:var(--green-lt)}
.slot-icon{font-size:1.6rem;margin-bottom:6px}
.slot-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3)}
.slot-name{font-size:.72rem;color:var(--green);font-family:var(--mono);margin-top:4px;font-weight:600;word-break:break-all}
.slot-hint{font-size:.72rem;color:var(--text-3);margin-top:3px}
.slot-status{font-size:.72rem;color:var(--accent);margin-top:3px;font-weight:500}
input[type="file"]{display:none}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.name-field label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);display:block;margin-bottom:5px}
.name-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text-1);padding:7px 10px;font-size:.88rem;font-family:var(--sans);transition:border-color .15s}
.name-field input:focus{outline:none;border-color:var(--accent);background:white}
.parse-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.92rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,87,255,.2)}
.parse-btn:hover:not(:disabled){background:#0047d9;transform:translateY(-1px)}
.parse-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.gantt-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.gantt-toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.gantt-project{font-weight:700;font-size:.95rem}
.gantt-meta{font-size:.75rem;color:var(--text-3)}
.toolbar-right{display:flex;gap:6px;align-items:center}
.tab-btn{padding:5px 14px;border-radius:6px;font-size:.75rem;font-weight:600;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text-3);font-family:var(--sans);transition:all .15s}
.tab-btn.active{background:#f8f9fb;border-color:var(--border);color:var(--text-1)}
.export-btn{padding:5px 14px;border-radius:6px;font-size:.75rem;font-weight:600;border:1px solid var(--accent);background:var(--accent-lt);cursor:pointer;color:var(--accent);font-family:var(--sans)}
.export-btn:hover{background:var(--accent);color:white}
.legend{display:flex;flex-wrap:wrap;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);background:#fafbfc}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.gantt-wrap{overflow-x:auto;overflow-y:visible}
.gantt-inner{min-width:900px}
.gantt-months{display:flex;margin-left:200px;border-bottom:1px solid var(--border)}
.month-col{flex-shrink:0;text-align:center;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);padding:6px 0;border-right:1px solid var(--border)}
.month-col.now{color:var(--accent);background:#f0f5ff}
.phase-section{border-bottom:1px solid var(--border)}
.phase-section:last-child{border-bottom:none}
.phase-header{display:flex;align-items:center;padding:7px 16px;background:#fafbfc;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.phase-header:hover{background:var(--bg)}
.phase-arrow{font-size:9px;color:var(--text-3);margin-right:8px;transition:transform .2s;display:inline-block}
.phase-arrow.open{transform:rotate(90deg)}
.phase-name{font-size:.78rem;font-weight:700;flex:1}
.phase-pill{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
.milestone-row{display:flex;align-items:center;border-bottom:0.5px solid #f0f2f5;min-height:32px}
.milestone-row:last-child{border-bottom:none}
.ms-label{width:200px;flex-shrink:0;padding:6px 10px 6px 28px;font-size:.75rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-track{flex:1;position:relative;height:32px}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(0,87,255,.25);z-index:5;pointer-events:none}
.bar{position:absolute;height:18px;top:7px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:.65rem;font-weight:600;white-space:nowrap;overflow:hidden;cursor:default;transition:opacity .15s}
.bar:hover{opacity:.8}
.diamond{position:absolute;width:10px;height:10px;top:11px;transform:rotate(45deg) translateX(-50%);border-radius:1px;cursor:default;z-index:3}
.compare-row{display:flex;align-items:center;min-height:32px;border-bottom:0.5px solid #f0f2f5}
.compare-row:last-child{border-bottom:none}
.compare-label{width:200px;flex-shrink:0;padding:4px 10px 4px 28px;font-size:.72rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-dates{flex:1;display:flex;gap:8px;align-items:center;padding:4px 12px;font-size:.72rem;flex-wrap:wrap}
.date-a{color:var(--accent);font-family:var(--mono);font-weight:600}
.date-b{color:var(--green);font-family:var(--mono);font-weight:600}
.diff-badge{font-size:.65rem;padding:1px 7px;border-radius:4px;font-weight:700}
.diff-late{background:var(--red-lt);color:var(--red)}
.diff-early{background:var(--green-lt);color:var(--green)}
.diff-same{background:#f0f2f5;color:var(--text-3)}
.ms-list{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ms-card{background:#fafbfc;border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.ms-card-phase{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.ms-item{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border);font-size:.75rem}
.ms-item:last-child{border-bottom:none}
.ms-event{color:var(--text-2);flex:1;padding-right:8px}
.ms-date{font-family:var(--mono);font-size:.7rem;font-weight:600;white-space:nowrap}
.ms-date.past{color:var(--text-3);text-decoration:line-through}
.ms-date.soon{color:var(--amber)}
.ms-date.critical{color:var(--red)}
.hidden{display:none}
.err-bar{background:var(--red-lt);border:1px solid #fca5a5;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:.82rem;color:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-icon">📅</div>
  <div>
    <div class="topbar-title">Schedule Gantt Tool</div>
    <div class="topbar-sub">Upload PPTX from any company — auto-parse &amp; compare · No API key needed</div>
  </div>
</div>
<div class="main">
  <div class="upload-panel">
    <div class="panel-title">Upload Schedule Files</div>
    <div class="upload-slots">
      <label class="slot" id="slot1" ondragover="ev(event)" ondrop="drop(event,1)">
        <input type="file" id="file1" accept=".pptx" onchange="handleFile(1)">
        <div class="slot-icon" id="icon1">📄</div>
        <div class="slot-label">File A</div>
        <div id="name1" class="slot-name hidden"></div>
        <div id="hint1" class="slot-hint">Click or drag .pptx here</div>
        <div id="stat1" class="slot-status hidden"></div>
      </label>
      <label class="slot" id="slot2" ondragover="ev(event)" ondrop="drop(event,2)">
        <input type="file" id="file2" accept=".pptx" onchange="handleFile(2)">
        <div class="slot-icon" id="icon2">📄</div>
        <div class="slot-label">File B (optional)</div>
        <div id="name2" class="slot-name hidden"></div>
        <div id="hint2" class="slot-hint">For comparison</div>
        <div id="stat2" class="slot-status hidden"></div>
      </label>
    </div>
    <div class="name-row">
      <div class="name-field"><label>File A name</label><input type="text" id="nameA" value="File A" placeholder="e.g. HQ"></div>
      <div class="name-field"><label>File B name</label><input type="text" id="nameB" value="File B" placeholder="e.g. Wistron"></div>
    </div>
    <button class="parse-btn" id="parseBtn" onclick="generate()" disabled>📊 Generate Gantt Chart</button>
  </div>
  <div id="errBar" class="err-bar hidden"></div>
  <div id="output"></div>
</div>
<script>
// ── State ──────────────────────────────────────────────────────
const S = { texts:{1:'',2:''}, parsed:{1:null,2:null}, view:'gantt' };

// ── File loading ───────────────────────────────────────────────
function ev(e){e.preventDefault()}
function drop(e,n){e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.pptx'))loadFile(n,f)}
function handleFile(n){const f=document.getElementById('file'+n).files[0];if(f)loadFile(n,f)}
function detectCompanyName(filename) {
  const fn = filename.toLowerCase();
  const companies = [
    // ODM partners
    { name:'Wistron',    re:/wistron/i },
    { name:'Quanta',     re:/quanta/i },
    { name:'Compal',     re:/compal/i },
    { name:'Inventec',   re:/inventec/i },
    { name:'Pegatron',   re:/pegatron/i },
    { name:'Foxconn',    re:/foxconn|hon hai/i },
    { name:'Luxshare',   re:/luxshare/i },
    { name:'LongCheer',  re:/longcheer/i },
    { name:'Wingtech',   re:/wingtech/i },
    { name:'Huaqin',     re:/huaqin/i },
    { name:'HQ',         re:/hq|asia.bay|marina.*dev|dev.*schedule/i },
    { name:'BYD',        re:/byd/i },
    { name:'Jabil',      re:/jabil/i },
    { name:'Flextronics', re:/flextronics|flex/i },
    { name:'Celestica',  re:/celestica/i },
    { name:'TPV',        re:/tpv/i },
  ];
  for (const co of companies) {
    if (co.re.test(fn)) return co.name;
  }
  // Try to extract from filename: take first meaningful word
  const clean = filename.replace(/\.(pptx?|xlsx?)$/i,'').replace(/[\d_\-\.]+/g,' ').trim();
  const words = clean.split(/\s+/).filter(w=>w.length>2);
  return words[0] || filename.slice(0,20);
}

async function loadFile(n,f){
  setSlot(n,'loading','⏳','Extracting...');
  try{
    const txt=await extractPptx(f);
    S.texts[n]=txt;
    // Auto-fill company name
    const detectedName = detectCompanyName(f.name);
    const nameInput = document.getElementById('name'+(['','A','B'][n]));
    if (nameInput && (nameInput.value==='' || nameInput.value==='File '+['','A','B'][n])) {
      nameInput.value = detectedName;
    }
    setSlot(n,'done','✅',f.name,`${txt.length} chars`);
    checkReady();
  }catch(e){setSlot(n,'','❌','',e.message)}
}
function setSlot(n,cls,icon,name,stat){
  const sl=document.getElementById('slot'+n);
  sl.className='slot'+(cls?' '+cls:'');
  document.getElementById('icon'+n).textContent=icon;
  const nm=document.getElementById('name'+n);
  const st=document.getElementById('stat'+n);
  const hi=document.getElementById('hint'+n);
  if(name){nm.textContent=name;nm.classList.remove('hidden')}
  if(stat){st.textContent=stat;st.classList.remove('hidden')}
  if(name)hi.classList.add('hidden');
}
function checkReady(){document.getElementById('parseBtn').disabled=!S.texts[1]}

// ── PPTX text extraction ───────────────────────────────────────
async function extractPptx(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=async e=>{
      try{
        const arr=new Uint8Array(e.target.result);
        const files={};let i=0;
        while(i<arr.length-4){
          if(arr[i]===0x50&&arr[i+1]===0x4B&&arr[i+2]===0x03&&arr[i+3]===0x04){
            const nLen=arr[i+26]|(arr[i+27]<<8);
            const xLen=arr[i+28]|(arr[i+29]<<8);
            const cSz=arr[i+18]|(arr[i+19]<<8)|(arr[i+20]<<16)|(arr[i+21]<<24);
            const comp=arr[i+8]|(arr[i+9]<<8);
            const name=new TextDecoder().decode(arr.slice(i+30,i+30+nLen));
            const ds=i+30+nLen+xLen;
            if(/ppt\/slides\/slide\d+\.xml$/.test(name))files[name]={data:arr.slice(ds,ds+cSz),comp};
            i=ds+cSz;
          }else i++;
        }
        let txt='';
        const keys=Object.keys(files).sort();
        for(const k of keys){
          const xml=await decompress(files[k]);
          // Split on paragraph tags to preserve line structure
          const paras=xml.split(/<a:p[\s\/]|<a:p>/);
          for(const para of paras){
            const ms=[...para.matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)];
            const line=ms.map(m=>m[1]).join('').replace(/\s+/g,' ').trim();
            if(line.length>1)txt+=line+'\n';
          }
          txt+='\n';
        }
        resolve(txt.slice(0,30000));
      }catch(err){reject(err)}
    };
    r.readAsArrayBuffer(file);
  });
}
async function decompress({data,comp}){
  if(comp===0)return new TextDecoder().decode(data);
  const ds=new DecompressionStream('deflate-raw');
  const w=ds.writable.getWriter(),r=ds.readable.getReader();
  w.write(data);w.close();
  const chunks=[];
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value)}
  const out=new Uint8Array(chunks.reduce((s,c)=>s+c.length,0));
  let off=0;for(const c of chunks){out.set(c,off);off+=c.length}
  return new TextDecoder().decode(out);
}

// ── Date parsing helpers ───────────────────────────────────────
function parseDate(raw){
  if(!raw)return null;
  raw=raw.trim();
  // "26'4/24" or "27'1/29" or "26'12/25"
  let m=raw.match(/(\d{2})'(\d{1,2})\/(\d{1,2})/);
  if(m)return `20${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // "2026/4/24" or "2027/1/29"
  m=raw.match(/20(\d{2})\/(\d{1,2})\/(\d{1,2})/);
  if(m)return `20${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // "4/24" standalone - try to infer year from context
  m=raw.match(/^(\d{1,2})\/(\d{1,2})$/);
  if(m){
    const mo=parseInt(m[1]),dy=parseInt(m[2]);
    const yr=mo>=4?2026:2027;
    return `${yr}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  }
  return null;
}

function normalizeText(txt){
  return txt.replace(/[\u2019\u2018\u201c\u201d]/g,"'").replace(/\u000b/g,' ').replace(/\r/g,'');
}

// ── Main parser (rule-based, no API needed) ──────────────────
const PHASE_DEF = [
  { name:'Design / ME', color:'purple', kw:[/\bIDME\b/i,/kick.?off/i,/ME design/i,/schematic/i,/\blayout\b/i,/mockup/i,/\bDFM\b/i,/tooling start/i,/\baward\b/i,/ID lock/i,/DB GO\b/i,/DB layout/i,/CNC Fabrication/i,/mockup review/i] },
  { name:'DB',          color:'blue',   kw:[/\bDB SMT\b/i,/\bDB SVTP\b/i,/\bDB test\b/i,/\bBBU\b/i,/bring.?up/i,/DB Gerber/i,/DB Phase Exit/i,/DB pre.?build/i,/DB full.?build/i,/DB build/i,/DB G\/O/i,/\bDB GO\b/i] },
  { name:'SI',          color:'green',  kw:[/\bSI SMT\b/i,/\bSI SVTP\b/i,/\bSI test\b/i,/SI build/i,/\bSI G\/O\b/i,/\bSI GO\b/i,/SI Gerber/i,/SI Phase Exit/i,/SI pre.?build/i,/SI full.?build/i,/SI Pre Build/i,/SI Full Build/i] },
  { name:'PV',          color:'orange', kw:[/\bPV SMT\b/i,/\bPV SVTP\b/i,/\bSVTP\b/i,/\bPVR\b/i,/PV build/i,/\bPV G\/O\b/i,/\bPV GO\b/i,/PV Gerber/i,/PV Phase Exit/i,/PV pre.?build/i,/PV Pre-Build/i,/PV Full Build/i,/\bPLD\b/,/\bCFZ\b/,/\bSIT PVR\b/i,/\bRTM\b/,/SW PVR/i,/PVR material/i] },
  { name:'MV',          color:'pink',   kw:[/\bMV SMT\b/i,/\bMVR\b/i,/\bMV GO\b/i,/MV build/i,/MV pre.?build/i,/MV Pre-Build/i,/MV Full Build/i,/\bRTP\b/,/\bFCS\b/,/\bNC PR\b/i,/\bVN SMT\b/i,/\bVN FCS\b/i,/\bVN PR\b/i,/PR\/RTP/i,/MV Gerber/i,/VN Full build/i,/VN GS\b/i] },
  { name:'CPU Supply',  color:'red',    kw:[/\bES\d?\b.*ETD/i,/\bQS\b.*ETD/i,/CPU.*RTS/i,/NVL.*ETD/i,/WCL.*RTS/i,/PTL.*RTS/i,/WCL QS/i,/WCL Prod/i,/NVL ES/i,/NVL QS/i,/NVL Prod/i] },
];

function isNoiseLine(line) {
  return /^conditions?:/i.test(line) ||
         /^note[s]?:/i.test(line) ||
         /^taiwan.*holiday/i.test(line) ||
         /^china.*holiday/i.test(line) ||
         /^private.*confidential/i.test(line) ||
         /^assume/i.test(line) ||
         /^lunar new year/i.test(line) ||
         /^qingming/i.test(line) ||
         /^dragon boat/i.test(line) ||
         /^mid-year/i.test(line) ||
         /^mid-autumn/i.test(line) ||
         /^year-end/i.test(line) ||
         /^new year:/i.test(line) ||
         /^international labor/i.test(line) ||
         /^taiwan national/i.test(line) ||
         /idme.*must.*before/i.test(line) ||
         /hp review.*should/i.test(line) ||
         /resin.*paint/i.test(line) ||
         /npi pm:/i.test(line) ||
         /^vv$/i.test(line) ||
         line.length > 100;
}

// Infer year from month: Apr-Dec = 2026, Jan-Mar = 2027
function inferYear(month) {
  const m = parseInt(month);
  return m >= 4 ? 2026 : 2027;
}

function extractDates(line) {
  const dates = [];

  // Format 1: YY'M/D or YY\u2019M/D  e.g. "26'4/24" or "27\u20191/29"
  const re1 = /(\d{2})['\u2019\u2018](\d{1,2})\/(\d{1,2})/g;
  let m;
  while ((m = re1.exec(line)) !== null) {
    const d = `20${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    if (!dates.includes(d)) dates.push(d);
  }

  // Format 2: YYYY/M/D  e.g. "2027/1/21"
  const re2 = /\b(202[67])\/(\d{1,2})\/(\d{1,2})\b/g;
  while ((m = re2.exec(line)) !== null) {
    const d = `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    if (!dates.includes(d)) dates.push(d);
  }

  // Format 3: M/D (no year) e.g. "6/15", "12/4", "1/4"
  // Only if no year-prefixed dates already found
  if (dates.length === 0) {
    const re3 = /\b(\d{1,2})\/(\d{1,2})\b/g;
    while ((m = re3.exec(line)) !== null) {
      const mo = parseInt(m[1]), dy = parseInt(m[2]);
      // Sanity check: valid month/day
      if (mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
        const yr = inferYear(mo);
        const d = `${yr}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
        if (!dates.includes(d)) dates.push(d);
      }
    }
  }

  return dates;
}

function getPhase(line) {
  for (const ph of PHASE_DEF) {
    if (ph.kw.some(k => k.test(line))) return ph;
  }
  return null;
}

function cleanEvent(line) {
  let s = line
    // Remove YY'M/D dates
    .replace(/\d{2}['\u2019\u2018]\d{1,2}\/\d{1,2}/g, '')
    // Remove YYYY/M/D dates
    .replace(/202[67]\/\d{1,2}\/\d{1,2}/g, '')
    // Remove standalone M/D ranges like "6/15~7/28" or "6/15-7/28"
    .replace(/\d{1,2}\/\d{1,2}[~\-]\d{1,2}\/\d{1,2}/g, '')
    // Remove remaining M/D tokens
    .replace(/\b\d{1,2}\/\d{1,2}\b/g, '')
    // Remove duration tokens
    .replace(/\(\d+\.?\d*\s*(?:wks?|days?|weeks?)\)/gi, '')
    .replace(/\d+\.?\d*\s*w(?:ks?)?\b/gi, '')
    // Remove separators
    .replace(/^[=\-~\s>:()+]+|[=\-~\s>:()+]+$/g, '')
    .replace(/\s+/g, ' ').trim();
  if (s.length > 55) s = s.slice(0, 52) + '...';
  return s || line.slice(0, 40).trim();
}

function isCritical(line) {
  return /\bFCS\b|\bRTM\b|\bRTP\b|\/RTP|Phase Exit|\bPLD\b|\bCFZ\b/i.test(line);
}

// Join consecutive short text fragments that form one milestone
function joinFragments(lines) {
  const result = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // If next line has no date and is very short, might be continuation
    const next = lines[i+1] || '';
    const hasDates = extractDates(line).length > 0;
    const nextHasDates = extractDates(next).length > 0;
    // If current has date and next is label-only (short, no date), merge
    if (hasDates && next && !nextHasDates && next.length < 20 && !isNoiseLine(next)) {
      result.push(line + ' ' + next);
      i += 2;
    } else {
      result.push(line);
      i++;
    }
  }
  return result;
}

function parseScheduleText(txt, srcName) {
  txt = txt.replace(/[\u2019\u2018\u201c\u201d\u2032\u02bc]/g, "'")
           .replace(/\u000b/g, ' ')
           .replace(/\r/g, '');

  let lines = txt.split('\n').map(l => l.trim()).filter(l => l.length > 2);
  lines = joinFragments(lines);

  const phaseMap = new Map();
  for (const ph of PHASE_DEF) phaseMap.set(ph.name, { ...ph, milestones: [] });

  let projectName = '', fcsDate = null;

  for (const line of lines) {
    // Project name
    if (!projectName && /milestone|schedule/i.test(line) && line.length < 100 && /\d/.test(line)) {
      projectName = line.replace(/private\/confidential/gi,'').trim().slice(0,80);
    }
    // FCS
    if (!fcsDate && /\bFCS\b/i.test(line)) {
      const ds = extractDates(line);
      if (ds.length) fcsDate = ds[0];
    }

    if (isNoiseLine(line)) continue;

    const dates = extractDates(line);
    if (!dates.length) continue;

    const ph = getPhase(line);
    if (!ph) continue;

    const eventName = cleanEvent(line);
    if (!eventName || eventName.length < 2) continue;
    if (/^conditions?$/i.test(eventName)) continue;

    const type = dates.length >= 2 ? 'range' : 'point';
    const entry = {
      event: eventName,
      date: dates[0],
      endDate: dates.length >= 2 ? dates[1] : null,
      type,
      critical: isCritical(line),
    };

    const bucket = phaseMap.get(ph.name);
    if (!bucket.milestones.find(m => m.event === entry.event && m.date === entry.date)) {
      bucket.milestones.push(entry);
    }
  }

  const phases = [];
  for (const [, ph] of phaseMap) {
    if (!ph.milestones.length) continue;
    ph.milestones.sort((a, b) => a.date.localeCompare(b.date));
    phases.push({ name: ph.name, color: ph.color, milestones: ph.milestones });
  }

  // Detect platform variants from project text
  const platformKW = [
    { key:'intel_wcl', label:'Intel WCL', re:/intel.*wcl|wcl.*intel/i },
    { key:'intel_ptl', label:'Intel PTL', re:/intel.*ptl|ptl.*intel/i },
    { key:'intel_nvl', label:'Intel NVL', re:/intel.*nvl|nvl.*intel/i },
    { key:'intel_nextgen', label:'Intel Next Gen', re:/next.?gen|mainstream/i },
    { key:'qcom_main', label:'Qualcomm (Purwa/Mahua/Kalambo)', re:/purwa|mahua|kalambo/i },
    { key:'qcom_refresh', label:'Qualcomm (Refresh)', re:/mahua.r|kalambo.r|refresh/i },
  ];
  const detectedPlatforms = platformKW.filter(p => p.re.test(txt)).map(p => ({key:p.key, label:p.label}));

  return { project: projectName || srcName, fcs: fcsDate, phases, platforms: detectedPlatforms };
}

// ── Generate Gantt ─────────────────────────────────────────────
function generate(){
  const nameA=document.getElementById('nameA').value.trim()||'File A';
  const nameB=document.getElementById('nameB').value.trim()||'File B';
  try{
    S.parsed[1]=parseScheduleText(S.texts[1],nameA);
    S.parsed[2]=S.texts[2]?parseScheduleText(S.texts[2],nameB):null;
    currentPlatKey = null; // will be set to first platform in renderSummary
    S.currentCompany = null;
    S.view='summary';
    renderGantt(nameA,nameB);
    document.getElementById('errBar').classList.add('hidden');
  }catch(e){
    const eb=document.getElementById('errBar');
    eb.textContent='Error: '+e.message;
    eb.classList.remove('hidden');
  }
}

// ── Colors ─────────────────────────────────────────────────────
const COLORS={
  blue:  {bar:'#B5D4F4',text:'#0C447C',pill:'#e8f2ff',pillText:'#185FA5'},
  green: {bar:'#C0DD97',text:'#3B6D11',pill:'#e3f5ef',pillText:'#3B6D11'},
  orange:{bar:'#FAC775',text:'#633806',pill:'#fef3c7',pillText:'#854F0B'},
  pink:  {bar:'#F4C0D1',text:'#72243E',pill:'#fbeaf0',pillText:'#993556'},
  purple:{bar:'#CECBF6',text:'#3C3489',pill:'#ede9fe',pillText:'#534AB7'},
  red:   {bar:'#F7C1C1',text:'#791F1F',pill:'#fdf0ef',pillText:'#A32D2D'},
  gray:  {bar:'#D3D1C7',text:'#444441',pill:'#f1efe8',pillText:'#5F5E5A'},
};

// ── Render ──────────────────────────────────────────────────
const PHASE_COLORS_MAP = {
  'Design / ME': {bg:'#534AB7',text:'white'},
  'DB':          {bg:'#185FA5',text:'white'},
  'SI':          {bg:'#3B6D11',text:'white'},
  'PV':          {bg:'#854F0B',text:'white'},
  'MV':          {bg:'#993556',text:'white'},
  'CPU Supply':  {bg:'#A32D2D',text:'white'},
};

const ALL_PLATFORMS = [
  { key:'intel_wcl',    label:'Intel WCL',   re:/wcl/i },
  { key:'intel_ptl',    label:'Intel PTL',   re:/ptl/i },
  { key:'intel_nvl',    label:'Intel NVL',   re:/nvl/i },
  { key:'qcom_main',    label:'Qualcomm',    re:/purwa|mahua|kalambo/i },
  { key:'qcom_refresh', label:'QC Refresh',  re:/mahua.r|kalambo.r|refresh/i },
];

let currentPlatKey = 'all';

function renderGantt(nameA, nameB) {
  const pA = S.parsed[1], pB = S.parsed[2];
  if (!pA) return;
  if (S.view === 'summary') { renderSummary(nameA, nameB); return; }
  if (S.view === 'compare')  { renderCompareView(nameA, nameB); return; }

  // ── GANTT VIEW ──────────────────────────────────────────────
  const hasB = !!pB;
  const today = new Date();
  const allDates = [];
  for (const p of [pA, pB].filter(Boolean))
    for (const ph of p.phases)
      for (const ms of ph.milestones) {
        if (ms.date) allDates.push(new Date(ms.date));
        if (ms.endDate) allDates.push(new Date(ms.endDate));
      }
  if (!allDates.length) { document.getElementById('output').innerHTML='<p style="padding:20px;color:var(--text-3)">No dates found.</p>'; return; }

  const minD = new Date(Math.min(...allDates)); minD.setDate(1);
  const maxD = new Date(Math.max(...allDates)); maxD.setMonth(maxD.getMonth()+1, 1);
  const total = maxD - minD;
  const pct = d => Math.max(0, Math.min(100, (new Date(d) - minD) / total * 100));
  const todayPct = pct(today);
  const todayLine = todayPct>0&&todayPct<100 ? `<div class="today-line" style="left:${todayPct}%"></div>` : '';

  const months = [];
  let cur = new Date(minD);
  while (cur < maxD) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }
  const monthCols = months.map(m => {
    const lbl = m.toLocaleDateString('en',{month:'short'})+' '+String(m.getFullYear()).slice(2);
    const isNow = m.getMonth()===today.getMonth()&&m.getFullYear()===today.getFullYear();
    return `<div class="month-col${isNow?' now':''}" style="width:${(1/months.length*100).toFixed(2)}%">${lbl}</div>`;
  }).join('');

  function buildGanttBlock(pData, srcName, colorAccent) {
    if (!pData) return '';
    const phaseNames = pData.phases.map(p=>p.name).filter(n=>n!=='CPU Supply');
    const phaseFlowHtml = phaseNames.map((name,i) => {
      const pc = PHASE_COLORS_MAP[name]||{bg:'#888',text:'white'};
      const sid = `phase-${srcName.replace(/\s+/g,'-')}-${name.replace(/[\s\/]+/g,'-')}`;
      const isLast = i===phaseNames.length-1;
      return `<div style="display:flex;align-items:stretch;flex:1;min-width:70px">
        <div onclick="scrollToPhase('${sid}')" title="Jump to ${name}"
          style="background:${pc.bg};color:${pc.text};font-weight:700;font-size:.78rem;
          padding:7px 8px 7px ${i===0?'8px':'18px'};display:flex;align-items:center;justify-content:center;
          flex:1;cursor:pointer;transition:filter .15s;
          clip-path:${isLast?'none':`polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%,${i===0?'0':'10px'} 50%)`};z-index:${10-i}"
          onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter=''">${name}</div>
      </div>`;
    }).join('');

    let phasesHtml = '';
    for (const ph of pData.phases) {
      const col = COLORS[ph.color]||COLORS.gray;
      const sid = `phase-${srcName.replace(/\s+/g,'-')}-${ph.name.replace(/[\s\/]+/g,'-')}`;
      phasesHtml += `<div class="phase-section" id="${sid}">
        <div class="phase-header" onclick="togglePhase(this)">
          <span class="phase-arrow open">▶</span>
          <span class="phase-name" style="color:${col.pillText};cursor:pointer" onclick="event.stopPropagation();scrollToPhase('${sid}')">${ph.name}</span>
          <span class="phase-pill" style="background:${col.pill};color:${col.pillText}">${ph.milestones.length} items</span>
        </div>
        <div class="phase-body">`;
      for (const ms of ph.milestones) {
        const left = pct(ms.date);
        const isRange = ms.type==='range'&&ms.endDate;
        const w = isRange ? Math.max(0.8, pct(ms.endDate)-left) : 0;
        const dateLabel = isRange ? ms.date.slice(5)+'~'+ms.endDate.slice(5) : ms.date.slice(5);
        const barHtml = isRange
          ? `<div class="bar" style="left:${left}%;width:${w}%;background:${col.bar};color:${col.text}" title="${ms.event}: ${dateLabel}">${w>6?ms.event:''}</div>`
          : `<div style="position:absolute;left:${left}%;top:3px;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);z-index:3;pointer-events:none">
               <div style="width:10px;height:10px;background:${ms.critical?'#c0392b':col.pillText};transform:rotate(45deg);border-radius:1px"></div>
               <div style="font-size:.6rem;color:${ms.critical?'#c0392b':col.pillText};font-family:var(--mono);font-weight:600;white-space:nowrap;margin-top:1px;background:rgba(255,255,255,.9);padding:0 2px;border-radius:2px">${dateLabel}</div>
             </div>`;
        phasesHtml += `<div class="milestone-row" style="min-height:${isRange?32:44}px">
          <div class="ms-label" title="${ms.event} (${dateLabel})">${ms.event}
            <span style="display:block;font-size:.65rem;color:var(--text-3);font-family:var(--mono)">${isRange?dateLabel:''}</span>
          </div>
          <div class="ms-track" style="height:${isRange?32:44}px">${todayLine}${barHtml}</div>
        </div>`;
      }
      phasesHtml += '</div></div>';
    }

    const legendHtml = Object.entries(COLORS).filter(([k])=>['blue','green','orange','pink','purple','red'].includes(k)).map(([k,v])=>{
      const name={blue:'DB',green:'SI',orange:'PV',pink:'MV',purple:'Design',red:'CPU'}[k];
      return `<div class="legend-item"><div class="legend-dot" style="background:${v.bar}"></div>${name}</div>`;
    }).join('');

    return `<div class="gantt-panel" style="margin-bottom:20px" data-src="${srcName}">
      <div class="gantt-toolbar">
        <div>
          <div class="gantt-project" style="color:${colorAccent}">${srcName}</div>
          <div class="gantt-meta">${pData.project.slice(0,80)} · FCS: ${pData.fcs||'TBD'}</div>
        </div>
      </div>
      <div style="display:flex;overflow:hidden;border-bottom:1px solid var(--border)">${phaseFlowHtml}</div>
      <div class="legend" style="padding:8px 16px">${legendHtml}
        <div class="legend-item"><div style="width:10px;height:10px;background:#c0392b;transform:rotate(45deg);border-radius:1px;flex-shrink:0"></div>Critical</div>
      </div>
      <div class="gantt-wrap"><div class="gantt-inner">
        <div class="gantt-months">${monthCols}</div>
        ${phasesHtml}
      </div></div>
    </div>`;
  }

  const nameA2 = nameA||'File A', nameB2 = nameB||'File B';
  const topToolbar = `<div class="gantt-panel" style="padding:0;margin-bottom:20px">
    <div class="gantt-toolbar">
      <div>
        <div class="gantt-project">${nameA2}${hasB?' vs '+nameB2:''}</div>
        <div class="gantt-meta">FCS: ${pA.fcs||'TBD'}${hasB&&pB?.fcs?' / '+pB.fcs:''}</div>
      </div>
      <div class="toolbar-right">
        <button class="tab-btn" onclick="switchView('summary')">📋 Summary</button>
        <button class="tab-btn active" onclick="switchView('gantt')">📊 Gantt</button>
        ${hasB?`<button class="tab-btn" onclick="switchView('compare')">🔄 Compare</button>`:''}
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
  </div>`;

  document.getElementById('output').innerHTML = topToolbar +
    buildGanttBlock(pA, nameA2, 'var(--accent)') +
    (hasB ? buildGanttBlock(pB, nameB2, 'var(--green)') : '');
}

// ── Summary View ─────────────────────────────────────────────
function renderSummary(nameA, nameB) {
  const pA = S.parsed[1], pB = S.parsed[2];
  const hasB = !!pB;
  const nameA2 = nameA||'File A', nameB2 = nameB||'File B';
  const today = new Date();

  // Companies list
  const companies = [{ name: nameA2, data: pA, accent: 'var(--accent)' }];
  if (hasB) companies.push({ name: nameB2, data: pB, accent: 'var(--green)' });
  if (!S.currentCompany || !companies.find(c=>c.name===S.currentCompany)) {
    S.currentCompany = companies[0].name;
  }

  // Current company data
  const cur = companies.find(c=>c.name===S.currentCompany) || companies[0];
  const curData = cur.data;
  if (!curData) return;

  // All platforms from both files
  const platSet = new Map();
  for (const p of [pA, pB].filter(Boolean)) {
    for (const pl of (p.platforms||[])) {
      if (!platSet.has(pl.key)) platSet.set(pl.key, pl);
    }
  }
  const platforms = [...platSet.values()];
  // Default to first available platform
  const platKeys = [...platSet.keys()];
  if (!currentPlatKey || !platSet.has(currentPlatKey)) {
    currentPlatKey = platKeys[0] || 'all';
  }

  // Filter milestones by platform
  function getFilteredPhases(pData, platKey) {
    const result = [];
    for (const ph of pData.phases) {
      const seen = new Set();
      const items = ph.milestones.filter(ms => {
        // Platform filter
        if (platKey !== 'all') {
          const re = ALL_PLATFORMS.find(p=>p.key===platKey)?.re;
          if (re) {
            const txt = (ms.event||'').toLowerCase();
            const hasAny = ALL_PLATFORMS.some(p=>p.re.test(txt));
            if (!re.test(txt) && hasAny) return false;
          }
        }
        // Deduplicate: same event + same date = skip
        const key = ms.event.trim().toLowerCase() + '|' + ms.date;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      if (items.length) result.push({...ph, milestones: items});
    }
    return result;
  }

  function dateCls(dateStr, critical) {
    const d = new Date(dateStr);
    if (d < today) return 'past';
    if (critical) return 'critical';
    return (d-today)/86400000 < 30 ? 'soon' : '';
  }

  // Exclude CPU Supply from main content (shown in sidebar)
  const allPhases = getFilteredPhases(curData, currentPlatKey);
  const phases = allPhases.filter(ph => ph.name !== 'CPU Supply');
  const platLabel = platforms.find(p=>p.key===currentPlatKey)?.label || platKeys[0] || '';

  // Phase flow arrows
  const phaseNames = curData.phases.map(p=>p.name).filter(n=>n!=='CPU Supply');
  const phaseFlowHtml = phaseNames.map((name,i) => {
    const pc = PHASE_COLORS_MAP[name]||{bg:'#888',text:'white'};
    const isLast = i===phaseNames.length-1;
    return `<div style="display:flex;align-items:stretch;flex:1;min-width:60px">
      <div style="background:${pc.bg};color:${pc.text};font-weight:700;font-size:.76rem;
        padding:8px 4px 8px ${i===0?'10px':'18px'};display:flex;align-items:center;justify-content:center;
        flex:1;clip-path:${isLast?'none':`polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%,${i===0?'0':'10px'} 50%)`};z-index:${10-i}"
      >${name}</div>
    </div>`;
  }).join('');

  // Build milestone table
  let phasesHtml = '';
  let totalItems = 0;
  for (const ph of phases) {
    const col = COLORS[ph.color]||COLORS.gray;
    totalItems += ph.milestones.length;
    phasesHtml += `
      <div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 20px;background:${col.pill};position:sticky;top:0;z-index:2;border-bottom:1px solid ${col.bar}">
          <div style="width:10px;height:10px;background:${col.pillText};border-radius:2px;flex-shrink:0"></div>
          <span style="font-size:.76rem;font-weight:700;color:${col.pillText};text-transform:uppercase;letter-spacing:.05em">${ph.name}</span>
          <span style="font-size:.7rem;color:${col.pillText};opacity:.6;margin-left:auto">${ph.milestones.length} items</span>
        </div>
        <table style="width:100%;border-collapse:collapse">
          ${ph.milestones.map((ms,i) => {
            const cls = dateCls(ms.date, ms.critical);
            const dateStr = ms.type==='range'&&ms.endDate
              ? ms.date.slice(5)+' → '+ms.endDate.slice(5)
              : ms.date.slice(5);
            const dateColor = cls==='past'?'var(--text-3)':cls==='critical'?'var(--red)':cls==='soon'?'var(--amber)':'var(--text-1)';
            return `<tr style="background:${i%2===0?'var(--surface)':'var(--surface2)'};border-bottom:0.5px solid var(--border)">
              <td style="padding:7px 20px;font-size:.8rem;color:var(--text-2)">
                ${ms.event}
                ${ms.critical?'<span style="margin-left:6px;font-size:.62rem;background:var(--red-lt);color:var(--red);padding:1px 5px;border-radius:3px;font-weight:700;vertical-align:middle">KEY</span>':''}
              </td>
              <td style="padding:7px 20px;font-family:var(--mono);font-size:.75rem;font-weight:600;text-align:right;color:${dateColor};${cls==='past'?'text-decoration:line-through':''};white-space:nowrap">${dateStr}</td>
            </tr>`;
          }).join('')}
        </table>
      </div>`;
  }

  if (!phasesHtml) {
    phasesHtml = '<div style="padding:40px;text-align:center;color:var(--text-3);font-size:.85rem">No milestones for this platform</div>';
  }

  // Platform chips
  const platChips = platforms.map(pl =>
    `<button onclick="selectPlatform('${pl.key}')"
      style="padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:600;
      border:1.5px solid ${pl.key===currentPlatKey?'var(--accent)':'var(--border2)'};
      background:${pl.key===currentPlatKey?'var(--accent)':'white'};
      color:${pl.key===currentPlatKey?'white':'var(--text-2)'};
      cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap">${pl.label}</button>`
  ).join('');

  // Company sidebar
  const companySidebar = companies.map(co => {
    const isActive = co.name === S.currentCompany;
    return `<div onclick="selectCompany('${co.name}')"
      style="padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);
      border-left:3px solid ${isActive?co.accent:'transparent'};
      background:${isActive?'var(--surface)':'transparent'};transition:all .15s">
      <div style="font-weight:700;font-size:.88rem;color:${isActive?co.accent:'var(--text-3)'}">${co.name}</div>
      <div style="font-size:.7rem;color:var(--text-3);margin-top:2px;font-family:var(--mono)">FCS: ${co.data?.fcs||'TBD'}</div>
    </div>`;
  }).join('');

  document.getElementById('output').innerHTML = `
    <!-- Top toolbar -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none">
      <div class="gantt-toolbar" style="padding:12px 20px">
        <div>
          <div class="gantt-project">${nameA2}${hasB?' vs '+nameB2:''}</div>
          <div class="gantt-meta">FCS: ${pA.fcs||'TBD'}${hasB&&pB?.fcs?' / '+pB.fcs:''}</div>
        </div>
        <div class="toolbar-right">
          <button class="tab-btn active" onclick="switchView('summary')">📋 Summary</button>
          <button class="tab-btn" onclick="switchView('gantt')">📊 Gantt Chart</button>
          ${hasB?`<button class="tab-btn" onclick="switchView('compare')">🔄 Compare</button>`:''}
          <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        </div>
      </div>
      <!-- Platform selector -->
      <div style="padding:8px 20px 10px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);flex-shrink:0">Platform</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${platChips}</div>
      </div>
    </div>

    <!-- Main layout: sidebar + content -->
    <div style="display:flex;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;background:var(--surface)">

      ${hasB ? `
      <!-- Company sidebar -->
      <div style="width:180px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface2)">
        <div style="padding:10px 20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);border-bottom:1px solid var(--border)">Company</div>
        ${companySidebar}
        <!-- CPU Supply section -->
        ${(() => {
          const cpuPhase = curData.phases.find(p => p.name === 'CPU Supply');
          if (!cpuPhase || !cpuPhase.milestones.length) return '';
          const col = COLORS[cpuPhase.color] || COLORS.red;
          return `<div>
            <div style="padding:8px 20px;font-size:.68rem;font-weight:700;text-transform:uppercase;
              letter-spacing:.08em;color:${col.pillText};border-top:2px solid var(--border);
              border-bottom:1px solid var(--border);background:${col.pill};margin-top:4px">
              CPU Supply
            </div>
            ${cpuPhase.milestones.map(ms => {
              const dateStr = ms.type==='range'&&ms.endDate
                ? ms.date.slice(5)+'→'+ms.endDate.slice(5)
                : ms.date.slice(5);
              return `<div style="padding:6px 20px;border-bottom:0.5px solid var(--border);font-size:.72rem">
                <div style="color:var(--text-2);margin-bottom:1px;line-height:1.3">${ms.event}</div>
                <div style="font-family:var(--mono);font-size:.68rem;font-weight:600;color:${col.pillText}">${dateStr}</div>
              </div>`;
            }).join('')}
          </div>`;
        })()}
      </div>` : ''}

      <!-- Content -->
      <div style="flex:1;min-width:0;display:flex;flex-direction:column">
        <!-- Info bar -->
        <div style="padding:9px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0">
          <span style="font-weight:700;font-size:.9rem;color:${cur.accent}">${S.currentCompany}</span>
          <span style="color:var(--border2)">·</span>
          <span style="font-size:.78rem;color:var(--text-3)">${platLabel}</span>
          <span style="color:var(--border2)">·</span>
          <span style="font-size:.78rem;color:var(--text-3)">FCS: <strong style="color:var(--red);font-family:var(--mono)">${curData.fcs||'TBD'}</strong></span>
          <span style="margin-left:auto;font-size:.72rem;color:var(--text-3)">${totalItems} milestones</span>
        </div>
        <!-- Phase flow -->
        <div style="display:flex;overflow:hidden;border-bottom:1px solid var(--border);flex-shrink:0">${phaseFlowHtml}</div>
        <!-- Milestone list -->
        <div style="overflow-y:auto;flex:1">${phasesHtml}</div>
      </div>
    </div>`;
}

window.selectPlatform = function(platKey) {
  currentPlatKey = platKey;
  if (!currentPlatKey) currentPlatKey = null;
  const nA = document.getElementById('nameA')?.value?.trim()||'File A';
  const nB = document.getElementById('nameB')?.value?.trim()||'File B';
  renderSummary(nA, nB);
};

window.selectCompany = function(name) {
  S.currentCompany = name;
  const nA = document.getElementById('nameA')?.value?.trim()||'File A';
  const nB = document.getElementById('nameB')?.value?.trim()||'File B';
  renderSummary(nA, nB);
};

// ── Compare View ──────────────────────────────────────────────
function renderCompareView(nameA, nameB) {
  const pA = S.parsed[1], pB = S.parsed[2];
  if (!pA||!pB) return;
  const nameA2=nameA||'File A', nameB2=nameB||'File B';
  const phaseNames = [...new Set([...pA.phases.map(p=>p.name),...pB.phases.map(p=>p.name)])];
  let rows = '';
  for (const phName of phaseNames) {
    const phA = pA.phases.find(p=>p.name===phName);
    const phB = pB.phases.find(p=>p.name===phName);
    const col = COLORS[(phA||phB).color]||COLORS.gray;
    const allEvts = new Map();
    for (const ms of (phA?.milestones||[])) allEvts.set(ms.event,{a:ms,b:null});
    for (const ms of (phB?.milestones||[])) {
      if (allEvts.has(ms.event)) allEvts.get(ms.event).b=ms;
      else allEvts.set(ms.event,{a:null,b:ms});
    }
    rows += `<div class="phase-section">
      <div class="phase-header" onclick="togglePhase(this)">
        <span class="phase-arrow open">▶</span>
        <span class="phase-name" style="color:${col.pillText}">${phName}</span>
        <span class="phase-pill" style="background:${col.pill};color:${col.pillText}">${allEvts.size} items</span>
      </div>
      <div class="phase-body">
        <div class="compare-row" style="background:#fafbfc;min-height:26px">
          <div class="compare-label" style="color:var(--text-3);font-size:.7rem;font-weight:700">Milestone</div>
          <div class="compare-dates">
            <span style="color:var(--accent);min-width:80px;font-size:.72rem;font-weight:700">${nameA2}</span>
            <span style="color:var(--green);min-width:80px;font-size:.72rem;font-weight:700">${nameB2}</span>
            <span style="color:var(--amber);font-size:.72rem;font-weight:700">Diff</span>
          </div>
        </div>`;
    for (const [evt,{a,b}] of allEvts) {
      const dA=a?.date||null, dB=b?.date||null;
      let diffHtml='<span class="diff-badge diff-same">—</span>';
      if (dA&&dB) {
        const diff=Math.round((new Date(dB)-new Date(dA))/86400000);
        diffHtml=diff===0?`<span class="diff-badge diff-same">same</span>`:diff>0?`<span class="diff-badge diff-late">+${diff}d</span>`:`<span class="diff-badge diff-early">${diff}d</span>`;
      } else if (!dA) diffHtml=`<span class="diff-badge diff-late">${nameB2} only</span>`;
      else diffHtml=`<span class="diff-badge diff-early">${nameA2} only</span>`;
      rows+=`<div class="compare-row">
        <div class="compare-label" title="${evt}">${evt}</div>
        <div class="compare-dates">
          <span class="date-a" style="min-width:80px">${dA?dA.slice(5):'—'}</span>
          <span class="date-b" style="min-width:80px">${dB?dB.slice(5):'—'}</span>
          ${diffHtml}
        </div>
      </div>`;
    }
    rows+='</div></div>';
  }

  document.getElementById('output').innerHTML=`
    <div class="gantt-panel" style="padding:0;margin-bottom:20px">
      <div class="gantt-toolbar">
        <div><div class="gantt-project">Compare: ${nameA2} vs ${nameB2}</div></div>
        <div class="toolbar-right">
          <button class="tab-btn" onclick="switchView('summary')">📋 Summary</button>
          <button class="tab-btn" onclick="switchView('gantt')">📊 Gantt Chart</button>
          <button class="tab-btn active" onclick="switchView('compare')">🔄 Compare</button>
          <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        </div>
      </div>
    </div>
    <div class="gantt-panel">${rows}</div>`;
}

window.scrollToPhase = function(sectionId) {
  const el = document.getElementById(sectionId);
  if (!el) return;
  // Expand if collapsed
  const body = el.querySelector('.phase-body');
  const arrow = el.querySelector('.phase-arrow');
  if (body && body.style.display === 'none') {
    body.style.display = '';
    if (arrow) arrow.classList.add('open');
  }
  // Scroll into view
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // Flash highlight
  const header = el.querySelector('.phase-header');
  if (header) {
    header.style.transition = 'background .2s';
    header.style.background = '#e8effe';
    setTimeout(() => { header.style.background = ''; }, 1200);
  }
};

window.filterPlatform = function(btn, srcName, platKey) {
  const panel = btn.closest('[data-src]');
  if (!panel) return;

  // Update chip styles
  const accentColor = panel.querySelector('.gantt-project')?.style.color || 'var(--accent)';
  panel.querySelectorAll('.plat-chip').forEach(b => {
    b.style.background = 'white';
    b.style.color = 'var(--text-2)';
    b.style.borderColor = 'var(--border2)';
  });
  btn.style.background = accentColor;
  btn.style.color = 'white';
  btn.style.borderColor = accentColor;

  const platMap = {
    intel_wcl: /wcl/i, intel_ptl: /ptl/i, intel_nvl: /nvl/i,
    intel_nextgen: /next.?gen|mainstream/i,
    qcom_main: /purwa|mahua|kalambo/i, qcom_refresh: /refresh/i,
  };

  // Filter rows - show/hide entire rows cleanly
  panel.querySelectorAll('.milestone-row').forEach(row => {
    if (platKey === 'all') {
      row.style.display = '';
    } else {
      const label = (row.querySelector('.ms-label')?.title || row.querySelector('.ms-label')?.textContent || '').toLowerCase();
      const re = platMap[platKey];
      // Show row if event label matches platform OR if no platform keywords at all (generic items)
      const hasAnyPlatKey = Object.values(platMap).some(r => r.test(label));
      const matches = re && re.test(label);
      row.style.display = (matches || !hasAnyPlatKey) ? '' : 'none';
    }
  });

  // Update item counts on phase headers
  panel.querySelectorAll('.phase-section').forEach(section => {
    const body = section.querySelector('.phase-body');
    const pill = section.querySelector('.phase-pill');
    if (!body || !pill) return;
    const visible = body.querySelectorAll('.milestone-row:not([style*="display: none"]):not([style*="display:none"])').length;
    const total = body.querySelectorAll('.milestone-row').length;
    pill.textContent = platKey === 'all' ? `${total} items` : `${visible} / ${total}`;
  });
};

function switchView(v){
  S.view=v;
  const nA=document.getElementById('nameA')?.value?.trim()||'File A';
  const nB=document.getElementById('nameB')?.value?.trim()||'File B';
  renderGantt(nA,nB);
}

function togglePhase(hdr){
  const body=hdr.nextElementSibling;
  const arrow=hdr.querySelector('.phase-arrow');
  if(body.style.display==='none'){body.style.display='';arrow.classList.add('open')}
  else{body.style.display='none';arrow.classList.remove('open')}
}

function exportCSV(){
  const nA=document.getElementById('nameA').value.trim()||'File A';
  const nB=document.getElementById('nameB').value.trim()||'File B';
  const rows=[['Source','Phase','Event','Date','End Date','Type','Critical']];
  for(const[src,pData] of[[nA,S.parsed[1]],[nB,S.parsed[2]]].filter(([,d])=>d))
    for(const ph of pData.phases)
      for(const ms of ph.milestones)
        rows.push([src,ph.name,ms.event,ms.date,ms.endDate||'',ms.type,ms.critical?'Yes':'No']);
  const csv=rows.map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='schedule.csv';a.click();
}
</script>
